<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalMart - Order Placed</title>
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/theme.css">
  <link rel="stylesheet" href="../../styles/pages/order-success.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone-screen">
      <section class="success-hero">
        <div class="success-icon">&#10003;</div>
        <h1>Order placed!</h1>
        <p class="success-copy">Thabang's Bags will confirm shortly. Estimated delivery: <span id="estimatedDelivery">3-5 business days</span>.</p>
      </section>

      <section class="reference-card">
        <p class="reference-label">Order reference</p>
        <strong id="orderReference">LM-2026-000001</strong>
      </section>

      <section class="details-card">
        <div class="detail-row">
          <span>Item</span>
          <strong id="successItem">-</strong>
        </div>
        <div class="detail-row">
          <span>Total paid</span>
          <strong id="successTotal">P 0.00</strong>
        </div>
        <div class="detail-row">
          <span>Payment</span>
          <strong id="successPayment">-</strong>
        </div>
        <div class="detail-row">
          <span>Delivery</span>
          <strong id="successDelivery">-</strong>
        </div>
      </section>

      <section class="actions">
        <a class="primary-button" href="../home/index.html">Continue shopping</a>
        <a class="secondary-button" href="../cart/index.html">Track my order</a>
      </section>
    </section>
  </main>

  <script src="../../scripts/core/checkout.js"></script>
  <script src="../../scripts/modules/checkout/success.js"></script>
</body>
</html>
