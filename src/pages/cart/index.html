<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalMart - Cart</title>
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/theme.css">
  <link rel="stylesheet" href="../../styles/pages/cart.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone-screen">
      <header class="topbar">
        <a class="back-link" href="../home/index.html">&larr; Back</a>
        <h1>Cart</h1>
        <button class="text-button" id="clearCartButton" type="button">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 7H19"></path>
            <path d="M9 7V5.5C9 4.95 9.45 4.5 10 4.5H14C14.55 4.5 15 4.95 15 5.5V7"></path>
            <path d="M8 9.5L8.6 18.2C8.64 18.7 9.05 19.08 9.55 19.08H14.45C14.95 19.08 15.36 18.7 15.4 18.2L16 9.5"></path>
          </svg>
          <span>Clear</span>
        </button>
      </header>

      <section class="cart-summary-strip">
        <p class="summary-label">Your basket</p>
        <p class="summary-count"><span id="itemCount">0</span> item(s)</p>
      </section>

      <section class="cart-content">
        <div class="cart-list" id="cartList" aria-live="polite"></div>

        <aside class="order-summary" id="orderSummary">
          <div class="summary-row">
            <span>Subtotal</span>
            <strong id="subtotalValue">P 0.00</strong>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <strong id="deliveryValue">P 25.00</strong>
          </div>
          <div class="summary-row total-row">
            <span>Total</span>
            <strong id="totalValue">P 25.00</strong>
          </div>
          <button class="primary-button" id="checkoutButton" type="button">Continue to checkout</button>
        </aside>
      </section>

      <nav class="bottom-nav" aria-label="Primary">
        <a class="nav-item" href="../home/index.html">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10.5L12 4L20 10.5V19C20 19.55 19.55 20 19 20H14V14H10V20H5C4.45 20 4 19.55 4 19V10.5Z"></path>
          </svg>
          <span>Home</span>
        </a>
        <a class="nav-item" href="../home/index.html?focusSearch=1">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="5.5"></circle>
            <path d="M15.2 15.2L20 20"></path>
          </svg>
          <span>Search</span>
        </a>
        <a class="nav-item is-active" href="../cart/index.html" aria-current="page">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 6H7L8.2 13.2C8.28 13.68 8.7 14.03 9.19 14.03H17.3C17.76 14.03 18.17 13.72 18.29 13.28L19.75 8.25H8"></path>
            <circle cx="10" cy="18.25" r="1.25"></circle>
            <circle cx="17" cy="18.25" r="1.25"></circle>
          </svg>
          <span>Cart</span>
        </a>
        <a class="nav-item" href="../profile/index.html">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8.25" r="3.25"></circle>
            <path d="M6 19C6.85 16.4 9.03 15 12 15C14.97 15 17.15 16.4 18 19"></path>
          </svg>
          <span>Profile</span>
        </a>
      </nav>
    </section>
  </main>

  <script src="../../scripts/core/catalog.js"></script>
  <script src="../../scripts/core/cart.js"></script>
  <script src="../../scripts/modules/cart/index.js"></script>
</body>
</html>
