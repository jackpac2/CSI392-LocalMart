<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalMart - Checkout Delivery</title>
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/theme.css">
  <link rel="stylesheet" href="../../styles/pages/checkout-delivery.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone-screen">
      <header class="topbar">
        <a class="back-link" href="../cart/index.html">&larr; Cart</a>
        <h1>Checkout</h1>
        <span class="topbar-spacer" aria-hidden="true"></span>
      </header>

      <section class="stepper" aria-label="Checkout progress">
        <div class="step is-active">
          <span class="step-number">1</span>
          <span class="step-label">Delivery</span>
        </div>
        <span class="step-line"></span>
        <div class="step">
          <span class="step-number">2</span>
          <span class="step-label">Payment</span>
        </div>
        <span class="step-line"></span>
        <div class="step">
          <span class="step-number">3</span>
          <span class="step-label">Confirm</span>
        </div>
      </section>

      <section class="summary-card">
        <div class="summary-row">
          <span>Items</span>
          <strong id="summaryItems">0</strong>
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="summarySubtotal">P 0.00</strong>
        </div>
      </section>

      <form class="checkout-form" id="deliveryForm">
        <section class="content-section">
          <h2>Delivery address</h2>

          <label class="field">
            <span>Full name</span>
            <input id="fullName" name="fullName" type="text" autocomplete="name" required>
          </label>

          <label class="field">
            <span>Phone number</span>
            <input id="phone" name="phone" type="tel" autocomplete="tel" required>
          </label>

          <label class="field">
            <span>Address / area</span>
            <input id="address" name="address" type="text" autocomplete="street-address" required>
          </label>

          <div class="field-row">
            <label class="field">
              <span>City</span>
              <input id="city" name="city" type="text" autocomplete="address-level2" required>
            </label>

            <label class="field">
              <span>Postcode</span>
              <input id="postcode" name="postcode" type="text" autocomplete="postal-code" required>
            </label>
          </div>
        </section>

        <section class="content-section">
          <h2>Delivery method</h2>

          <label class="method-card is-selected">
            <input type="radio" name="deliveryMethod" value="standard" checked>
            <span class="method-radio"></span>
            <span class="method-copy">
              <strong>Standard delivery</strong>
              <small>3-5 business days - P 25</small>
            </span>
          </label>

          <label class="method-card">
            <input type="radio" name="deliveryMethod" value="express">
            <span class="method-radio"></span>
            <span class="method-copy">
              <strong>Express delivery</strong>
              <small>1-2 business days - P 60</small>
            </span>
          </label>

          <label class="method-card">
            <input type="radio" name="deliveryMethod" value="pickup">
            <span class="method-radio"></span>
            <span class="method-copy">
              <strong>Pickup from vendor</strong>
              <small>Free - arrange with vendor</small>
            </span>
          </label>
        </section>

        <button class="primary-button" id="continueButton" type="submit">Continue to payment -></button>
      </form>
    </section>
  </main>

  <div class="toast" id="deliveryToast" role="status" aria-live="polite">Delivery details saved</div>

  <script src="../../scripts/core/catalog.js"></script>
  <script src="../../scripts/core/cart.js"></script>
  <script src="../../scripts/core/checkout.js"></script>
  <script src="../../scripts/modules/checkout/delivery.js"></script>
</body>
</html>
