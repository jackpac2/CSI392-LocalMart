<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalMart - Confirm Order</title>
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/theme.css">
  <link rel="stylesheet" href="../../styles/pages/checkout-confirm.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone-screen">
      <header class="topbar">
        <a class="back-link" href="../checkout-payment/index.html">&larr; Payment</a>
        <h1>Confirm order</h1>
        <span class="topbar-spacer" aria-hidden="true"></span>
      </header>

      <section class="stepper" aria-label="Checkout progress">
        <div class="step is-complete">
          <span class="step-number">&#10003;</span>
          <span class="step-label">Delivery</span>
        </div>
        <span class="step-line is-complete"></span>
        <div class="step is-complete">
          <span class="step-number">&#10003;</span>
          <span class="step-label">Payment</span>
        </div>
        <span class="step-line is-complete"></span>
        <div class="step is-active">
          <span class="step-number">3</span>
          <span class="step-label">Confirm</span>
        </div>
      </section>

      <section class="details-card">
        <div class="detail-row">
          <span>Item</span>
          <strong id="confirmItem">-</strong>
        </div>
        <div class="detail-row">
          <span>Vendor</span>
          <strong id="confirmVendor">-</strong>
        </div>
        <div class="detail-row">
          <span>Qty</span>
          <strong id="confirmQty">0</strong>
        </div>
        <div class="detail-row">
          <span>Delivery</span>
          <strong id="confirmDelivery">-</strong>
        </div>
        <div class="detail-row">
          <span>Payment</span>
          <strong id="confirmPayment">-</strong>
        </div>
        <div class="detail-row total-row">
          <span>Total</span>
          <strong id="confirmTotal">P 0.00</strong>
        </div>
      </section>

      <section class="address-card">
        <div>
          <p class="address-label">Deliver to</p>
          <strong id="deliverToName">-</strong>
        </div>
        <p class="address-text" id="deliverToAddress">-</p>
      </section>

      <section class="actions">
        <button class="primary-button" id="placeOrderButton" type="button">Place order - P 0.00</button>
        <a class="secondary-button" href="../checkout-delivery/index.html">Edit order</a>
      </section>
    </section>
  </main>

  <script src="../../scripts/core/catalog.js"></script>
  <script src="../../scripts/core/cart.js"></script>
  <script src="../../scripts/core/checkout.js"></script>
  <script src="../../scripts/modules/checkout/confirm.js"></script>
</body>
</html>
